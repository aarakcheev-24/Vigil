name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: ./build.sh

      - name: Zip
        run: ditto -c -k --keepParent Vigil.app Vigil.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vigil
          path: Vigil.zip

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Vigil.zip
